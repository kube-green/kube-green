nameOverride: ""
fullnameOverride: ""

manager:
  image:
    repository: yeramirez/kube-green
    pullPolicy: IfNotPresent
    tag: "0.7.16-backend-fix2"

  extraArgs: []

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  hostNetwork: false

  resources:
    limits:
      cpu: 400m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 200Mi

  metrics:
    enabled: true
    port: 8443
    secure: true
    serviceMonitor:
      enabled: false
      additionalLabels: {}
      selector: {}
      interval: 30s
      namespace: ""
      metricRelabelings: []
      relabelings: []

  api:
    enabled: true
    port: 8080
    cors: true

  auth:
    enabled: true
    jwtSecretName: "kube-green-jwt"
    usersSecretName: "kube-green-users"
    # Optional: set to pin JWT secret; if empty, chart keeps existing secret or generates on first install
    jwtSecret: ""
    # Optional: set to override users (format: username:bcryptHash:role, one per line)
    defaultUsers: ""

frontend:
  enabled: true
  replicas: 2
  image:
    repository: yeramirez/kube-front
    pullPolicy: IfNotPresent
    tag: "0.7.1-frontend-d08110b-manual2"
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: "kube-green-controller-manager"

podAnnotations:
  vault.hashicorp.com/agent-inject: "false"
  vault.hashicorp.com/agent-pre-populate: "false"
  vault.hashicorp.com/agent-pre-populate-only: "false"

podLabels: {}

podSecurityContext: {}

nodeSelector: {}

tolerations: []

affinity: {}

priorityClassName: ""

topologySpreadConstraints: []

certManager:
  enabled: true

jobsCert:
  enabled: false
  image:
    registry: registry.k8s.io
    repository: ingress-nginx/kube-webhook-certgen
    tag: "v20221220-controller-v1.5.1-58-g787ea74b6"
    pullPolicy: IfNotPresent

rbac:
  customClusterRole:
    enabled: false
    name: kube-green-manager-role-custom-aggregate
    rules: []
  extendedCRDs:
    enabled: false

crds:
  enabled: true
  keep: true
